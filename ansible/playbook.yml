- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks:
    - name: Copy WAR file to Tomcat
      copy:
        src: "/var/snap/jenkins/5022/workspace/MavenAnsibleWebApp03/target/MavenAnsibleWebApp03.war"
        dest: "/opt/tomcat/webapps/MavenAnsibleWebApp03.war.war"
        remote_src: no

    - name: Restart Tomcat
      systemd:
        name: tomcat
        state: restarted
